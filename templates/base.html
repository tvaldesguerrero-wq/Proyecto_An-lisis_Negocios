<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Predicción de ventas de videojuegos{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="cabecera">
        <div class="cabecera__contenido">
            <a href="{{ url_for('home') }}" class="cabecera__marca">
                <span class="cabecera__marca-icono">▣</span>
                Análisis de Ventas — Videojuegos
            </a>
            <nav class="cabecera__nav">
                <a href="{{ url_for('home') }}">Inicio</a>
                <a href="{{ url_for('prediccion') }}">Predicción</a>
            </nav>
        </div>
    </header>

    <main class="contenido">
        {% block contenido %}{% endblock %}
    </main>

    <footer class="pie">
        <p>Proyecto Semestral — Análisis de Negocios · Equipo ADN · USM 2026-01</p>
    </footer>

</body>
</html>
