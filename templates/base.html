<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Predicción de ventas de videojuegos{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="cabecera">
        <div class="cabecera__contenido">
            <a href="{{ url_for('home') }}" class="cabecera__marca">
                <span class="cabecera__marca-indicador"></span>
                Análisis de ventas — Videojuegos
            </a>
            <nav class="cabecera__nav">
                <a href="{{ url_for('home') }}" class="{{ 'activo' if request.endpoint == 'home' }}">Inicio</a>
                <a href="{{ url_for('prediccion') }}" class="{{ 'activo' if request.endpoint == 'prediccion' }}">Predicción</a>
            </nav>
        </div>
    </header>

    <main class="contenido">
        {% block contenido %}{% endblock %}
    </main>

</body>
</html>
